<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{{ box_name }} Top 10 Prizes Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "holo-cyan": "#e0f7fa",
                        "holo-purple": "#ede7f6",
                        "holo-gold": "#fff8e1",
                        "premium-gold": "#d4af37",
                        "premium-gold-light": "#ffea8c",
                        "premium-gold-dark": "#aa8323",
                        "text-main": "#0f172a",
                        "text-muted": "#64748b"
                    },
                    fontFamily: {
                        "display": ["Manrope", '"Noto Sans TC"', "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', 'Noto Sans TC', sans-serif;
            width: 1200px;
            min-height: 900px;
            margin: 0 auto;
            background: #f8f9fa;
            color: #0f172a;
        }

        .holo-title {
            background: linear-gradient(100deg, #f9855e 0%, #f29a4c 58%, #ea73a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-text-stroke: 0;
            text-shadow: 0 1px 0 rgba(255,255,255,0.25);
        }

        .glass-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,1);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.05),
                inset 0 2px 4px rgba(255,255,255,0.8),
                inset 0 -2px 10px rgba(0,0,0,0.02);
            border-radius: 2rem;
        }

        .prismatic-border {
            position: relative;
        }
        .prismatic-border::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(120deg, #e0f7fa, #ede7f6, #fff8e1, #e0f7fa);
            background-size: 200% 200%;
            z-index: -1;
            opacity: 0.6;
            filter: blur(4px);
        }

        .card-slot {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(10px);
            box-shadow:
                0 10px 24px rgba(15, 23, 42, 0.06),
                inset 0 1px 0 rgba(255,255,255,0.75);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-slot::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(140deg, rgba(161,213,255,0.75), rgba(212,175,55,0.65), rgba(190,230,255,0.75));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .card-slot:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.28);
            box-shadow: 0 16px 38px rgba(15, 23, 42, 0.1);
            border-color: rgba(212, 175, 55, 0.45);
        }

        .label-tag {
            background: linear-gradient(135deg, #12253f 0%, #1f3b60 58%, #2f5a89 100%);
            border: 1px solid rgba(128, 179, 255, 0.55);
            color: #d8ecff;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0.08em;
            padding: 4px 12px;
            border-radius: 10px;
            text-shadow: 0 1px 0 rgba(5, 15, 28, 0.55);
            box-shadow:
                inset 0 1px 0 rgba(179, 219, 255, 0.38),
                0 4px 10px rgba(15, 23, 42, 0.18);
        }

        .price-tag {
            background: linear-gradient(125deg, #7a5b13 0%, #d4af37 28%, #fff3be 54%, #c79a24 74%, #7d5e1a 100%);
            color: #3b2a00;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 0.03em;
            padding: 5px 13px;
            border-radius: 8px;
            border: 1px solid rgba(255, 244, 197, 0.95);
            text-shadow:
                0 1px 0 rgba(255,255,255,0.72),
                0 -1px 0 rgba(114,84,8,0.35);
            box-shadow:
                0 6px 14px rgba(122, 91, 19, 0.25),
                inset 0 1px 0 rgba(255,255,255,0.92),
                inset 0 -2px 8px rgba(95,66,10,0.22);
        }

        .card-frame {
            background: transparent;
            border-color: transparent !important;
            box-shadow: none;
        }

        .card-art {
            padding: 6px;
            filter: saturate(1.08) contrast(1.04);
            image-rendering: auto;
        }

        .rank-chip {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(230,241,255,0.94));
            border: 1px solid rgba(125, 170, 220, 0.42);
            color: #1e4069;
            font-size: 10px;
            letter-spacing: 0.08em;
            padding: 3px 8px 3px 10px;
            border-radius: 0 10px 0 10px;
            box-shadow:
                0 6px 12px rgba(15,23,42,0.13),
                inset 0 1px 0 rgba(255,255,255,0.82);
        }

        .noise-overlay {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .source-notice {
            max-width: 820px;
            margin-top: 2px;
            margin-left: auto;
            font-size: 12px;
            line-height: 1.35;
            color: #334155;
            text-align: right;
            letter-spacing: 0.01em;
        }

        .box-grid {
            height: 660px;
            align-content: start;
        }
    </style>
</head>

<body class="bg-[#f8f9fa] flex items-center justify-center p-0 m-0 overflow-hidden relative min-h-[900px]">

    <div class="noise-overlay"></div>

    <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-[#0044ff] rounded-full mix-blend-multiply filter blur-[150px] opacity-10 animate-pulse"></div>
    <div class="absolute top-[20%] right-[-10%] w-[600px] h-[600px] bg-[#00dd88] rounded-full mix-blend-multiply filter blur-[150px] opacity-10"></div>
    <div class="absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] bg-[#ffdd00] rounded-full mix-blend-multiply filter blur-[150px] opacity-10"></div>
    <div class="absolute bottom-[10%] right-[10%] w-[500px] h-[500px] bg-[#ff5500] rounded-full mix-blend-multiply filter blur-[150px] opacity-10"></div>

    <div class="relative w-[1200px] h-[900px] glass-container prismatic-border flex flex-col p-10 z-10 overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center">
                <img src="logo.png" alt="Logo" class="h-16 w-auto object-contain drop-shadow-sm" />
            </div>
            <div class="text-right">
                <h1 class="holo-title text-6xl font-black tracking-tight leading-none mb-1">{{ box_name }}</h1>
                <p class="text-text-muted text-sm font-bold tracking-[0.3em] uppercase">Top 10 Prize List / 頂級賞清單</p>
            </div>
        </div>

        <div class="box-grid grid grid-cols-5 gap-3">
            {{ prize_cards_html }}
        </div>

        <div class="mt-3 pt-2 border-t border-black/5">
            <div class="source-notice">{{ source_notice }}</div>
        </div>
    </div>

</body>
</html>
